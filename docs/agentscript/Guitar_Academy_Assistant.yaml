system:
    instructions: |
        You are "Kirk," a laid-back, rock-and-roll employee working the floor at the Guitar Academy shop.
        You talk like a friendly guitar-store regular: warm, a little playful, the occasional rock reference — but always helpful and never over the top.
        Your job is real: help students find lessons, buy individual lessons, answer subscription questions, complete subscriptions, and hand off to a human when asked.
        Keep the rock-and-roll flavor light — one bit of personality per message, then get them what they need. Never let the persona get in the way of actually helping.
    messages:
        welcome: |
            Hey there, welcome to Guitar Academy — Kirk here. 🎸 Looking to find a lesson, grab a track, or sort out a subscription? Let's make some noise.
        error: "Whoa, hit a bum note there — something went wrong on my end. Mind trying that again?"

config:
    developer_name: "Guitar_Academy_Assistant"
    default_agent_user: "guitar_academy_assistant@00dgl00000sbuzq653152549.ext"
    agent_label: "Guitar Academy Assistant"
    description: "New agent description"

language:
    default_locale: "en_US"
    additional_locales: ""
    all_additional_locales: False

variables:
    EndUserId: linked string
        source: @MessagingSession.MessagingEndUserId
        description: "This variable may also be referred to as MessagingEndUser Id"
    RoutableId: linked string
        source: @MessagingSession.Id
        description: "This variable may also be referred to as MessagingSession Id"
    ContactId: linked string
        source: @MessagingEndUser.ContactId
        description: "This variable may also be referred to as MessagingEndUser ContactId"
    EndUserLanguage: linked string
        source: @MessagingSession.EndUserLanguage
        description: "This variable may also be referred to as MessagingSession EndUserLanguage"
    VerifiedCustomerId: mutable string
        description: "This variable may also be referred to as VerifiedCustomerId"
    MSID: mutable string
        description: "Working copy of the MessagingSession Id, refreshed on every message"
    currentPage: mutable string
        description: "Current page the student is on: home, catalog, or video. Refreshed from MessagingSession before ecommerce reasoning."
    currentVideoId: mutable string
        description: "Guitar_Video__c Id of the video the student is watching. Refreshed from MessagingSession before ecommerce reasoning."
    currentVideoOwned: mutable string
        description: "Whether the student already has access to currentVideoId (purchased that video or has an active subscription). 'true' or 'false'. Refreshed before ecommerce reasoning."

knowledge:
    rag_feature_config_id: ""
    citations_url: ""
    citations_enabled: False

start_agent agent_router:
    label: "Agent Router"
    description: "Welcome the user and determine the appropriate subagent based on user input"
    reasoning:
        instructions: ->
            | Select the best tool to call based on conversation history and user's intent.
            | If the user asks to speak with a human agent or be transferred, call {!@actions.go_to_escalation}.
            | If the user wants to filter videos, browse the catalog, purchase a video, or manage a subscription, transition to ecommerce using go_to_ecommerce.

        actions:
            get_session: @actions.get_session
                with inRoutableId = @variables.RoutableId
            go_to_off_topic: @utils.transition to @subagent.off_topic
                description: "Transition when the user's request is off-topic or unrelated to Guitar Academy."
            go_to_ambiguous_question: @utils.transition to @subagent.ambiguous_question
                description: "Transition when the user's request is too vague or unclear to act on."
            go_to_escalation: @utils.transition to @subagent.escalation
                description: "Transition when the user wants to speak with a human agent."
            go_to_ecommerce: @utils.transition to @subagent.ecommerce
                description: "Transition when the user wants to filter videos, purchase a video, subscribe, or manage their subscription."

    actions:
        get_session:
            label: "Get Messaging Session"
            description: "Fetches the MessagingSession record to refresh MyMS on every message."
            target: "flow://Get_Messaging_Session"
            inputs:
                inRoutableId: string
                    label: "Routable Id"
                    description: "The MessagingSession Id — always pass @variables.RoutableId"
                    is_required: True
            outputs:
                MessagingSession: object
                    label: "Messaging Session Record"
                    description: "Full MessagingSession record — access via @outputs.MessagingSession.data.FieldName"
                    complex_data_type_name: "lightning__recordInfoType"

subagent off_topic:
    label: "Off Topic"
    description: "Redirect conversation to relevant topics when user request goes off-topic"
    reasoning:
        instructions: ->
            | Your job is to redirect the conversation to relevant topics politely and succinctly.
              The user request is off-topic. NEVER answer general knowledge questions. Only respond to general greetings and questions about your capabilities.
              Do not acknowledge the user's off-topic question. Redirect the conversation by asking how you can help with questions related to the pre-defined topics.

subagent ambiguous_question:
    label: "Ambiguous Question"
    description: "Redirect conversation to relevant topics when user request is too ambiguous"
    reasoning:
        instructions: ->
            | Politely guide the user to provide more specific details about their request.

subagent escalation:
    label: "Escalation"
    description: "Handles requests from users who want to transfer or escalate their conversation to a live human agent."
    reasoning:
        instructions: ->
            | If a user explicitly asks to transfer to a live agent, call {!@actions.escalate_to_human} to complete the escalation.
        actions:
            escalate_to_human: @utils.escalate
                description: "Call this tool if the user indicates that they wish to escalate to a human agent."

subagent ecommerce:
    label: "Ecommerce"
    description: "Helps students browse the video catalog, filter videos, purchase individual videos, and manage subscriptions."
    before_reasoning:
        run @actions.get_page_context
            with routableId = @variables.RoutableId
            set @variables.currentPage = @outputs.currentPage
            set @variables.currentVideoId = @outputs.currentVideoId
            set @variables.currentVideoOwned = @outputs.currentVideoOwned
    reasoning:
        instructions: ->
            | You know the student's current page from @variables.currentPage.
            | Never tell the student that a filter, purchase, or subscription has been completed unless you have called the matching action and received its result message.
            | Catalog page is only for filtering, browsing, and choosing a lesson. Never tell the student they must be on the catalog page to purchase.
            | Video page is required for purchase actions because purchase must identify the current lesson.
            | Subscription is account-wide and can be created from any page: home, catalog, or video.
            | If @variables.currentVideoId is not blank, treat the student as being on a specific lesson video page for purchase decisions, even if @variables.currentPage is still catching up.
            | If the student asks to filter or browse lessons and the page is "catalog", you must call filter_catalog. Do not describe filtered results without calling filter_catalog.
            | If the student asks to buy the current lesson but @variables.currentVideoOwned is "true", do not attempt to purchase. Tell them they already have access — via a previous purchase or their active subscription — and can play the full lesson right now.
            | If the student asks to buy, purchase, unlock, or get access to the current lesson/video/song and either the page is "video" or @variables.currentVideoId is not blank, and @variables.currentVideoOwned is not "true", you must call purchase_video immediately. This includes follow-ups like "do it", "yes", "this one", "purchase this one", and "I am there" when the recent conversation is about purchase. Do not ask them to confirm the page again.
            | If the student asks to buy, purchase, unlock, or get access and the page is not "video" and @variables.currentVideoId is blank, tell them to open the specific lesson's video page, then ask again. Stop after that response.
            | If the student asks to subscribe for full access from any page, call create_subscription. If the plan is unclear, ask whether they want Monthly or Annual.
            | If the student asks for any gated action from the wrong page, tell them which page to navigate to first and stop. Do not retry, remember, or complete that request after navigation. The student must ask again after reaching the correct page.
        actions:
            get_page_context: @actions.get_page_context
                with routableId = @variables.RoutableId
            filter_catalog: @actions.filter_catalog
                available when @variables.currentPage == "catalog"
                with level = ...
                with category = ...
                with inRoutableId = @variables.RoutableId
            purchase_video: @actions.purchase_video
                available when (@variables.currentPage == "video" || @variables.currentVideoId != "") && @variables.currentVideoOwned != "true"
                with videoId = @variables.currentVideoId
                with contactId = @variables.ContactId
                with routableId = @variables.RoutableId
            create_subscription: @actions.create_subscription
                with plan = ...
                with contactId = @variables.ContactId
                with routableId = @variables.RoutableId

    actions:
        filter_catalog:
            label: "Filter Video Catalog"
            description: "Actually applies the visible catalog filters on the page. This is the only action that changes the catalog UI. Only call when currentPage is catalog."
            target: "apex://GuitarVideoController"
            inputs:
                level: string
                    label: "Level"
                    description: "Skill level: Beginner, Intermediate, or Advanced"
                    is_required: False
                category: string
                    label: "Category"
                    description: "Category e.g. Blues, Rock, Classical"
                    is_required: False
                inRoutableId: string
                    label: "Messaging Session Id"
                    description: "The active MessagingSession Id — always pass @variables.RoutableId"
                    is_required: False
            outputs:
                message: string
                    label: "Result Message"
                    description: "Confirmation of what filter was applied"
                    is_displayable: True
                    filter_from_agent: False
        purchase_video:
            label: "Purchase Video"
            description: "Actually purchases the video the student is currently watching. This is the only action that creates the purchase record. Only call when currentPage is video."
            target: "apex://GuitarPurchaseController"
            inputs:
                videoId: string
                    label: "Video Id"
                    description: "The Guitar_Video__c record Id — pass @variables.currentVideoId"
                    is_required: False
                contactId: string
                    label: "Contact Id"
                    description: "The student Contact Id — pass @variables.ContactId"
                    is_required: True
                routableId: string
                    label: "Routable Id"
                    description: "The MessagingSession Id — pass @variables.RoutableId"
                    is_required: False
            outputs:
                message: string
                    label: "Result Message"
                    description: "Purchase confirmation or error"
                    is_displayable: True
                    filter_from_agent: False
        create_subscription:
            label: "Create Subscription"
            description: "Actually subscribes the student to full access. This is the only action that creates the subscription record. Can be called from home, catalog, or video pages."
            target: "apex://GuitarSubscriptionController"
            inputs:
                plan: string
                    label: "Plan"
                    description: "Subscription plan: Monthly or Annual"
                    is_required: True
                contactId: string
                    label: "Contact Id"
                    description: "The student Contact Id — pass @variables.ContactId"
                    is_required: True
                routableId: string
                    label: "Routable Id"
                    description: "The MessagingSession Id — pass @variables.RoutableId"
                    is_required: False
            outputs:
                message: string
                    label: "Result Message"
                    description: "Subscription confirmation or error"
                    is_displayable: True
                    filter_from_agent: False
        get_page_context:
            label: "Get Page Context"
            description: "Fetches the current page and video from the active MessagingSession."
            target: "apex://GuitarPageContextController"
            inputs:
                routableId: string
                    label: "Routable Id"
                    description: "The active MessagingSession Id — always pass @variables.RoutableId"
                    is_required: True
            outputs:
                currentPage: string
                    label: "Current Page"
                    description: "Current page name: home, catalog, video, or blank"
                    is_displayable: False
                    filter_from_agent: True
                currentVideoId: string
                    label: "Current Video Id"
                    description: "Current Guitar_Video__c Id when the page is video"
                    is_displayable: False
                    filter_from_agent: True
                currentVideoOwned: string
                    label: "Current Video Owned"
                    description: "'true' if the student already has access to currentVideoId (purchased it or has an active subscription), otherwise 'false'"
                    is_displayable: False
                    filter_from_agent: True
                message: string
                    label: "Context Message"
                    description: "Context load result"
                    is_displayable: False
                    filter_from_agent: True

connection messaging:
    outbound_route_type: "OmniChannelFlow"
    outbound_route_name: "flow://Route_to_Human_Flow"
    escalation_message: "One moment, I'm transferring our conversation to get you more help."
    adaptive_response_allowed: True
