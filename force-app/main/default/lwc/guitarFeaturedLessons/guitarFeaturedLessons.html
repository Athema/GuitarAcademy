<template>
    <div class="featured">
        <div class="featured-header">
            <div class="title-row">
                <h2>Featured Lessons</h2>
                <template if:true={subscriptionLabel}>
                    <span class="sub-badge">&#10003; {subscriptionLabel}</span>
                </template>
            </div>
            <a class="browse-all" onclick={handleBrowseAll}>Browse All &rarr;</a>
        </div>

        <template if:true={hasVideos}>
            <div class="featured-grid">
                <template for:each={videosWithAccess} for:item="item">
                    <c-guitar-video-card key={item.key} video={item.video} is-owned={item.isOwned}></c-guitar-video-card>
                </template>
            </div>
        </template>

        <template if:true={hasError}>
            <p style="color:red">Error: {errorMessage}</p>
        </template>

        <template if:true={isEmpty}>
            <p style="color:orange">No featured videos found.</p>
        </template>
    </div>
</template>
