<template>
    <div class="catalog">
        <div class="catalog-header">
            <div class="title-row">
                <h1>Guitar Lessons</h1>
                <template if:true={subscriptionLabel}>
                    <span class="sub-badge">&#10003; {subscriptionLabel}</span>
                </template>
            </div>
            <div class="filters">
                <div class="filter-group">
                    <label for="level-filter">Level</label>
                    <select id="level-filter" onchange={handleLevelChange}>
                        <option value="">All Levels</option>
                        <option value="Beginner">Beginner</option>
                        <option value="Intermediate">Intermediate</option>
                        <option value="Advanced">Advanced</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="cat-filter">Category</label>
                    <select id="cat-filter" onchange={handleCategoryChange}>
                        <option value="">All Categories</option>
                        <option value="Technique">Technique</option>
                        <option value="Theory">Theory</option>
                        <option value="Song Lesson">Song Lesson</option>
                        <option value="Gear &amp; Tone">Gear &amp; Tone</option>
                    </select>
                </div>
            </div>
        </div>

        <template if:true={hasVideos}>
            <div class="video-grid">
                <template for:each={videosWithAccess} for:item="item">
                    <c-guitar-video-card key={item.key} video={item.video} is-owned={item.isOwned}></c-guitar-video-card>
                </template>
            </div>
        </template>

        <template if:true={isEmpty}>
            <div class="empty-state">
                <p>No lessons match your filters.</p>
            </div>
        </template>

        <template if:true={hasError}>
            <div class="error-state">
                <p>Unable to load lessons. Please try again.</p>
            </div>
        </template>
    </div>
</template>
